<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img"
  aria-labelledby="title desc">
  <title id="title">Mission Placeholder 01</title>
  <desc id="desc">Temporary placeholder image for mission hero slider.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2933" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)" />
  <g fill="none" stroke="#f20d0d" stroke-opacity="0.28" stroke-width="2">
    <line x1="0" y1="200" x2="1600" y2="200" />
    <line x1="0" y1="500" x2="1600" y2="500" />
    <line x1="0" y1="800" x2="1600" y2="800" />
  </g>
  <text x="50%" y="50%" text-anchor="middle" fill="#edf0f2" font-family="monospace" font-size="56"
    letter-spacing="12">PLACEHOLDER 01</text>
</svg>
